<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>班级作业统计+成绩管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif;font-size:14px;}
body{background:#fff;padding:10px;}
h2{text-align:center;margin-bottom:12px;color:#222;}
/* 顶部固定区域：仅保留班级选择，永久显示 */
.top-fixed{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
/* 菜单外层容器 */
.menu-wrap{margin-bottom:10px;}
/* 菜单切换按钮 */
.toggle-menu-btn{background:#2563eb;color:#fff;border:none;cursor:pointer;padding:8px 12px;border-radius:6px;margin-bottom:5px;}
/* 功能菜单栏 默认折叠 */
.ctrl-top{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center;display: none;flex-direction:column;align-items:flex-start;width:100%;}
/* 按钮行样式 */
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;width:100%;}
/* 批量姓名区域样式 */
.name-paste{margin:8px 0;padding:10px;background:#f7f9fc;border-radius:8px;width:100%;display:none;}
.name-paste textarea{width:100%;height:80px;margin:8px 0;resize:none;}
/* 班级名称编辑区域，嵌入菜单栏 */
.class-edit-box{margin:8px 0;padding:10px;background:#fff3e0;border-radius:8px;width:100%;display:none;}
.class-edit-box input{width:200px;margin-right:10px;}
select, button, input, textarea{padding:8px 12px;border-radius:6px;border:1px solid #ccc;}
button{background:#2563eb;color:#fff;border:none;cursor:pointer;}
button:disabled{background:#ccc;cursor:not-allowed;}
.btn-clear{background:#ef4444;}
.btn-export{background:#10b981;}
.btn-edit{background:#f59e0b;}
.btn-add{background:#8b5cf6;}
.btn-del-class{background:#dc2626;}
.btn-toggle-stat{background:#6b7280;}
.toggle-btn{background:#6b7280;margin:5px 0;}
table{width:100%;border-collapse:collapse;overflow-x:auto;display:block;margin:10px 0;}
th,td{border:1px solid #333;padding:4px 2px;text-align:center;min-width:45px;}
th{background:#f0f0f0;font-weight:bold;position:sticky;top:0;z-index:10;}
.unit-title{background:#e8e8e8;font-weight:bold;}
.score-title{background:#d8e8f8;font-weight:bold;}
input[type="checkbox"]{width:18px;height:18px;cursor:pointer;}
input[type="number"], input[type="text"]{width:100%;border:none;text-align:center;padding:2px;}
/* 平时成绩、总成绩只读样式 */
input[readonly]{background:#f0f0f0;cursor:default;}
#statInfo{margin:10px 0;padding:10px;background:#f7f9fc;border-radius:8px;line-height:1.6;display:none;} /* 统计区域默认折叠 */
#exportTip{display:none;} /* 隐藏导出提示文本 */
/* 菜单栏展开状态 */
.ctrl-top.show{display:flex;}
</style>
</head>
<body>
<h2>班级作业统计+成绩管理系统</h2>

<!-- 【唯一永久显示】班级选择下拉框 -->
<div class="top-fixed">
    <label>选择班级：</label>
    <select id="classSelect"></select>
</div>

<!-- 【全部可折叠区域】包含所有操作按钮、编辑班级、批量姓名 -->
<div class="menu-wrap">
    <button class="toggle-menu-btn" onclick="toggleTopMenu()">展开操作菜单栏</button>
    <div class="ctrl-top" id="topMenu">
        <!-- 第一行：各类功能按钮 -->
        <div class="btn-row">
            <button onclick="toggleClassEdit()" class="btn-edit">编辑当前班级名称</button>
            <button onclick="addClass()" class="btn-add">新增班级</button>
            <button onclick="deleteCurrentClass()" class="btn-del-class" id="delClassBtn">删除当前班级</button>
            <button onclick="calcAllStat()" class="btn-stat">统计当前班级数据</button>
            <button onclick="toggleStatInfo()" class="btn-toggle-stat">展开/收起统计信息</button>
            <button onclick="exportToExcel()" class="btn-export">导出Excel文件</button>
            <span id="exportTip"></span>
            <button onclick="clearCurrentClass()" class="btn-clear">清空当前班所有数据</button>
            <button onclick="toggleNamePaste()" class="toggle-btn">展开/收起 批量姓名填充</button>
        </div>

        <!-- 班级名称编辑区域（移入折叠栏内） -->
        <div class="class-edit-box" id="classEditBox">
            <label>班级名称：</label>
            <input type="text" id="classNameInput" placeholder="输入自定义班级名称">
            <button onclick="saveClassName()">保存班级名称</button>
        </div>

        <!-- 批量姓名粘贴区域 -->
        <div class="name-paste" id="namePasteBox">
            <label><strong>批量粘贴学生姓名</strong>（44人，每行1个名字，粘贴后点击填充）：</label>
            <textarea id="nameInput" placeholder="胡诗淇&#10;王陈宇&#10;姚辰昊&#10;..."></textarea>
            <button onclick="fillNames()">一键填充姓名到表格</button>
        </div>
    </div>
</div>

<!-- 统计信息区域（默认折叠） -->
<div id="statInfo">点击【统计当前班级数据】更新完成情况与分数统计</div>

<!-- 核心成绩表格 -->
<table>
  <thead>
    <tr>
      <th rowspan="2">学号</th>
      <th rowspan="2">姓名</th>
      <th colspan="3" class="unit-title">第一单元</th>
      <th colspan="3" class="unit-title">第二单元</th>
      <th colspan="3" class="unit-title">第三单元</th>
      <th colspan="4" class="score-title">成绩</th>
    </tr>
    <tr>
      <th>思维导图</th><th>笔记</th><th>单元练习</th>
      <th>思维导图</th><th>笔记</th><th>单元练习</th>
      <th>思维导图</th><th>笔记</th><th>单元练习</th>
      <th>期中</th><th>期末</th><th>平时成绩</th><th>总成绩</th>
    </tr>
  </thead>
  <tbody id="tableBody">
  </tbody>
</table>

<script>
// 字段定义
const fieldKeys = [
    "u1mind", "u1note", "u1score",
    "u2mind", "u2note", "u2score",
    "u3mind", "u3note", "u3score",
    "midScore", "finalScore", "usualScore", "totalScore"
];
const totalStu = 44; // 固定44个学生
let classList = [];
let currentClassId = null;
let xlsxLoaded = false;

// 切换顶部功能菜单栏 展开/折叠
function toggleTopMenu(){
    const menu = document.getElementById('topMenu');
    const btn = document.querySelector('.toggle-menu-btn');
    menu.classList.toggle('show');
    if(menu.classList.contains('show')){
        btn.innerText = '收起操作菜单栏';
    }else{
        btn.innerText = '展开操作菜单栏';
    }
}

// 初始化班级数据
function initClassData(){
    const localData = localStorage.getItem("dynamicClassFullData");
    if(localData){
        classList = JSON.parse(localData);
        if(!Array.isArray(classList)){
            classList = Object.keys(classList).map(key=>({
                id: Number(key),
                name: classList[key].name,
                data: classList[key].data
            }));
        }
    }else{
        classList = [
            {id: 1, name: "四1班", data: {}},
            {id: 2, name: "四2班", data: {}},
            {id: 3, name: "四3班", data: {}},
            {id: 4, name: "四4班", data: {}},
            {id: 5, name: "四5班", data: {}},
            {id: 6, name: "四6班", data: {}},
            {id: 7, name: "四7班", data: {}},
            {id: 8, name: "四8班", data: {}}
        ];
    }
    if(classList.length === 0){
        classList.push({id: 1, name: "默认班级", data: {}});
    }
    currentClassId = classList[0].id;
    classList.forEach(cls=>{
        Object.values(cls.data).forEach(stu=>{
            stu.usualScore = calcUsualScore(stu);
            stu.totalScore = calcTotalScore(stu);
        })
    })
    saveClassList();
}

// 保存班级列表到本地存储
function saveClassList(){
    localStorage.setItem("dynamicClassFullData", JSON.stringify(classList));
}

// 初始化班级下拉选项
function initClassSelect(){
    const select = document.getElementById("classSelect");
    select.innerHTML = "";
    classList.forEach(cls=>{
        const option = document.createElement("option");
        option.value = cls.id;
        option.innerText = cls.name;
        select.appendChild(option);
    })
    select.value = currentClassId;
    document.getElementById("delClassBtn").disabled = classList.length <= 1;
}

// 切换班级
document.getElementById("classSelect").addEventListener("change", function(){
    currentClassId = Number(this.value);
    renderTable();
    calcAllStat();
})

// 新增班级
function addClass(){
    const maxId = classList.reduce((max, cls)=>Math.max(max, cls.id), 0);
    const newId = maxId + 1;
    const newName = `新班级${newId}`;
    classList.push({
        id: newId,
        name: newName,
        data: {}
    });
    saveClassList();
    initClassSelect();
    currentClassId = newId;
    document.getElementById("classSelect").value = newId;
    renderTable();
    calcAllStat();
    alert(`已成功新增班级：${newName}，可点击【编辑当前班级名称】修改名称`);
}

// 删除当前班级
function deleteCurrentClass(){
    if(classList.length <= 1){
        alert("至少需要保留1个班级，无法删除");
        return;
    }
    const currentClass = getCurrentClass();
    if(!confirm(`确认删除班级【${currentClass.name}】？该班级的所有作业、成绩数据将全部删除，无法恢复！`)){
        return;
    }
    classList = classList.filter(cls=>cls.id !== currentClassId);
    saveClassList();
    currentClassId = classList[0].id;
    initClassSelect();
    renderTable();
    calcAllStat();
    alert(`已成功删除班级【${currentClass.name}】`);
}

// 获取当前班级数据
function getCurrentClass(){
    return classList.find(cls=>cls.id === currentClassId);
}

// 展开/收起班级名称编辑区域
function toggleClassEdit(){
    const box = document.getElementById("classEditBox");
    const isShow = box.style.display === "block";
    box.style.display = isShow ? "none" : "block";
    if(!isShow){
        const currentClass = getCurrentClass();
        document.getElementById("classNameInput").value = currentClass.name;
        document.getElementById("classNameInput").focus();
    }
}

// 保存自定义班级名称
function saveClassName(){
    const newName = document.getElementById("classNameInput").value.trim();
    if(!newName){
        alert("请输入班级名称");
        return;
    }
    const currentClass = getCurrentClass();
    currentClass.name = newName;
    saveClassList();
    initClassSelect();
    toggleClassEdit();
    alert(`班级名称已修改为：${newName}`);
}

// 展开/收起姓名粘贴区域
function toggleNamePaste(){
    const box = document.getElementById("namePasteBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

// 展开/收起统计信息区域
function toggleStatInfo(){
    const statBox = document.getElementById("statInfo");
    const isShow = statBox.style.display === "block";
    statBox.style.display = isShow ? "none" : "block";
}

// 计算平时成绩
function calcUsualScore(stuData){
    const scoreItems = ["u1mind", "u1note", "u2mind", "u2note", "u3mind", "u3note"];
    let doneCount = 0;
    scoreItems.forEach(key=>{
        if(stuData[key]) doneCount++;
    })
    if(doneCount === 6) return 20;
    const perItemScore = 20 / 6;
    const totalScore = doneCount * perItemScore;
    return Math.round(totalScore * 10) / 10;
}

// 计算总成绩
function calcTotalScore(stuData){
    const u1 = Number(stuData.u1score) || 0;
    const u2 = Number(stuData.u2score) || 0;
    const u3 = Number(stuData.u3score) || 0;
    const unitAvg = (u1 + u2 + u3) / 3;
    const usual = Number(stuData.usualScore) || 0;
    const mid = Number(stuData.midScore) || 0;
    const final = Number(stuData.finalScore) || 0;
    
    let total;
    if(mid > 0){
        total = (unitAvg * 0.3) + usual + (final * 0.4) + (mid * 0.1);
    }else{
        total = (unitAvg * 0.3) + usual + (final * 0.5);
    }
    return Math.round(total * 10) / 10;
}

// 渲染表格
function renderTable(){
    const wrap = document.getElementById("tableBody");
    wrap.innerHTML = "";
    const currentClass = getCurrentClass();
    const classData = currentClass.data;
    for(let no=1;no<=totalStu;no++){
        const tr = document.createElement("tr");
        let html = `<td>${no}</td>`;
        let stu = classData[no] || {name:""};
        stu.usualScore = calcUsualScore(stu);
        stu.totalScore = calcTotalScore(stu);
        html += `<td><input type="text" data-no="${no}" data-key="name" value="${stu.name}" onchange="saveCurrentClass()"></td>`;
        fieldKeys.forEach(k=>{
            if(k.includes("mind") || k.includes("note")){
                let checked = stu[k] ? "checked" : "";
                html += `<td><input type="checkbox" data-no="${no}" data-key="${k}" ${checked} onchange="saveCurrentClass()"></td>`;
            }else if(k === "usualScore" || k === "totalScore"){
                html += `<td><input type="number" data-no="${no}" data-key="${k}" value="${stu[k] || 0}" readonly></td>`;
            }else{
                let score = stu[k] || "";
                html += `<td><input type="number" data-no="${no}" data-key="${k}" value="${score}" onchange="saveCurrentClass()"></td>`;
            }
        })
        tr.innerHTML = html;
        wrap.appendChild(tr);
    }
}

// 批量填充姓名
function fillNames(){
    const nameText = document.getElementById("nameInput").value.trim();
    const nameList = nameText.split("\n").filter(n=>n.trim()!=="");
    if(nameList.length===0){
        alert("请先粘贴学生姓名，每行1个");
        return;
    }
    const currentClass = getCurrentClass();
    const classData = currentClass.data;
    nameList.forEach((name, idx)=>{
        const no = idx+1;
        if(no>totalStu) return;
        if(!classData[no]) classData[no] = {};
        classData[no].name = name.trim();
        classData[no].usualScore = calcUsualScore(classData[no]);
        classData[no].totalScore = calcTotalScore(classData[no]);
    })
    saveClassList();
    renderTable();
    alert(`已成功填充${nameList.length}个学生姓名到【${currentClass.name}】`);
}

// 保存当前班级数据
function saveCurrentClass(){
    const allInputs = document.querySelectorAll("input");
    const classData = {};
    allInputs.forEach(input=>{
        const n = input.dataset.no;
        const k = input.dataset.key;
        if(!n || !k) return;
        if(!classData[n]) classData[n] = {};
        if(input.type==="checkbox"){
            classData[n][k] = input.checked;
        }else{
            classData[n][k] = input.value;
        }
    })
    Object.values(classData).forEach(stu=>{
        stu.usualScore = calcUsualScore(stu);
        stu.totalScore = calcTotalScore(stu);
    })
    const currentClass = getCurrentClass();
    currentClass.data = classData;
    saveClassList();
    renderTable();
    calcAllStat();
}

// 统计当前班级数据
function calcAllStat(){
    const currentClass = getCurrentClass();
    const classData = currentClass.data;
    const className = currentClass.name;
    let u1mind=0,u1note=0,u2mind=0,u2note=0,u3mind=0,u3note=0;
    let u1scoreList=[],u2scoreList=[],u3scoreList=[],midList=[],finalList=[],usualList=[],totalList=[];

    Object.values(classData).forEach(stu=>{
        if(stu.u1mind) u1mind++;
        if(stu.u1note) u1note++;
        if(stu.u2mind) u2mind++;
        if(stu.u2note) u2note++;
        if(stu.u3mind) u3mind++;
        if(stu.u3note) u3note++;
        if(stu.u1score) u1scoreList.push(Number(stu.u1score));
        if(stu.u2score) u2scoreList.push(Number(stu.u2score));
        if(stu.u3score) u3scoreList.push(Number(stu.u3score));
        if(stu.midScore) midList.push(Number(stu.midScore));
        if(stu.finalScore) finalList.push(Number(stu.finalScore));
        if(stu.usualScore) usualList.push(Number(stu.usualScore));
        if(stu.totalScore) totalList.push(Number(stu.totalScore));
    })

    const calcScore = (list)=>{
        if(list.length===0) return {avg:"-",max:"-",min:"-"};
        const sum = list.reduce((a,b)=>a+b,0);
        return {
            avg:(sum/list.length).toFixed(1),
            max:Math.max(...list),
            min:Math.min(...list)
        }
    }

    const u1score = calcScore(u1scoreList);
    const u2score = calcScore(u2scoreList);
    const u3score = calcScore(u3scoreList);
    const midScore = calcScore(midList);
    const finalScore = calcScore(finalList);
    const usualScore = calcScore(usualList);
    const totalScore = calcScore(totalList);

    let info = `<strong>${className}统计（全班44人）</strong><br>
【作业完成情况】<br>
第一单元：思维导图${u1mind}人完成｜笔记${u1note}人完成<br>
第二单元：思维导图${u2mind}人完成｜笔记${u2note}人完成<br>
第三单元：思维导图${u3mind}人完成｜笔记${u3note}人完成<br><br>
【分数统计（平均分/最高分/最低分）】<br>
第一单元练习：${u1score.avg} / ${u1score.max} / ${u1score.min}<br>
第二单元练习：${u2score.avg} / ${u2score.max} / ${u2score.min}<br>
第三单元练习：${u3score.avg} / ${u3score.max} / ${u3score.min}<br>
期中成绩：${midScore.avg} / ${midScore.max} / ${midScore.min}<br>
期末成绩：${finalScore.avg} / ${finalScore.max} / ${finalScore.min}<br>
平时成绩：${usualScore.avg} / ${usualScore.max} / ${usualScore.min}<br>
总成绩：${totalScore.avg} / ${totalScore.max} / ${totalScore.min}`;
    document.getElementById("statInfo").innerHTML = info;
}

// 导出Excel文件
function exportToExcel(){
    if(!xlsxLoaded){
        alert("Excel导出库加载中，请稍后重试");
        return;
    }
    const currentClass = getCurrentClass();
    const classData = currentClass.data;
    const className = currentClass.name;
    const header = [
        "学号","姓名",
        "第一单元-思维导图","第一单元-笔记","第一单元-单元练习",
        "第二单元-思维导图","第二单元-笔记","第二单元-单元练习",
        "第三单元-思维导图","第三单元-笔记","第三单元-单元练习",
        "期中成绩","期末成绩","平时成绩","总成绩"
    ];
    const rows = [];
    for(let no=1;no<=totalStu;no++){
        const stu = classData[no] || {name:""};
        const row = [no, stu.name];
        fieldKeys.forEach(k=>{
            if(k.includes("mind") || k.includes("note")){
                row.push(stu[k] ? "√" : "");
            }else{
                row.push(stu[k] || "");
            }
        })
        rows.push(row);
    }
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
    XLSX.utils.book_append_sheet(wb, ws, `${className}作业统计`);
    XLSX.writeFile(wb, `${className}作业统计_成绩表.xlsx`);
    alert(`${className}Excel文件已导出，可在下载文件夹查看`);
}

// 清空当前班级所有数据
function clearCurrentClass(){
    const currentClass = getCurrentClass();
    const className = currentClass.name;
    if(!confirm(`确认清空${className}所有数据？包括姓名、打勾、分数，无法恢复！`)) return;
    currentClass.data = {};
    saveClassList();
    renderTable();
    calcAllStat();
}

// 页面初始化
window.onload = ()=>{
    initClassData();
    initClassSelect();
    renderTable();
    calcAllStat();
    // 异步加载Excel导出库
    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js";
    script.onload = ()=>{
        xlsxLoaded = true;
    };
    script.onerror = ()=>{
        alert("Excel导出库加载失败，可正常使用其他功能");
    };
    document.body.appendChild(script);
}
</script>
</body>
</html>
