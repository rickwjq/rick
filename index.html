<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>班级作业统计+成绩管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif;font-size:14px;}
body{background:#fff;padding:10px;}
h2{text-align:center;margin-bottom:12px;color:#222;}
.top-fixed{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
.menu-wrap{margin-bottom:10px;}
.toggle-menu-btn{background:#2563eb;color:#fff;border:none;cursor:pointer;padding:8px 12px;border-radius:6px;margin-bottom:5px;}
.ctrl-top{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center;display: none;flex-direction:column;align-items:flex-start;width:100%;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;width:100%;}
.name-paste{margin:8px 0;padding:10px;background:#f7f9fc;border-radius:8px;width:100%;display:none;}
.name-paste textarea{width:100%;height:80px;margin:8px 0;resize:none;}
.class-edit-box{margin:8px 0;padding:10px;background:#fff3e0;border-radius:8px;width:100%;display:none;}
.class-edit-box input{width:200px;margin-right:10px;}
select, button, input, textarea{padding:8px 12px;border-radius:6px;border:1px solid #ccc;}
button{background:#2563eb;color:#fff;border:none;cursor:pointer;}
button:disabled{background:#ccc;cursor:not-allowed;}
.btn-clear{background:#ef4444;}
.btn-export{background:#10b981;}
.btn-edit{background:#f59e0b;}
.btn-add{background:#8b5cf6;}
.btn-del-class{background:#dc2626;}
.btn-toggle-stat{background:#6b7280;}
.toggle-btn{background:#6b7280;margin:5px 0;}
table{width:100%;border-collapse:collapse;overflow-x:auto;display:block;margin:10px 0;}
th,td{border:1px solid #333;padding:4px 2px;text-align:center;min-width:45px;}
th{background:#f0f0f0;font-weight:bold;position:sticky;top:0;z-index:10;}
.unit-title{background:#e8e8e8;font-weight:bold;}
.score-title{background:#d8e8f8;font-weight:bold;}
input[type="checkbox"]{width:18px;height:18px;cursor:pointer;}
input[type="number"], input[type="text"]{width:100%;border:none;text-align:center;padding:2px;
    user-select:text;
    -webkit-user-select:text;
}
input[readonly]{background:#f0f0f0;cursor:default;}
#statInfo{margin:10px 0;padding:10px;background:#f7f9fc;border-radius:8px;line-height:1.6;display:none;}
#exportTip{display:none;}
.ctrl-top.show{display:flex;}

/* 去除数字输入框上下箭头 */
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none !important;
    margin: 0 !important;
}
input[type="number"] {
    -moz-appearance: textfield !important;
    appearance: textfield !important;
}

/* 成绩单元格聚焦样式，贴近Excel选中效果 */
.score-input:focus {
    outline: 2px solid #2196F3;
    outline-offset: -2px;
}
</style>
</head>
<body>
<h2>班级作业统计+成绩管理系统</h2>
<div class="top-fixed">
    <label>选择班级：</label>
    <select id="classSelect"></select>
</div>
<div class="menu-wrap">
    <button class="toggle-menu-btn" onclick="toggleTopMenu()">展开操作菜单栏</button>
    <div class="ctrl-top" id="topMenu">
        <div class="btn-row">
            <button onclick="toggleClassEdit()" class="btn-edit">编辑当前班级名称</button>
            <button onclick="addClass()" class="btn-add">新增班级</button>
            <button onclick="deleteCurrentClass()" class="btn-del-class" id="delClassBtn">删除当前班级</button>
            <button onclick="calcAllStat()" class="btn-stat">统计当前班级数据</button>
            <button onclick="toggleStatInfo()" class="btn-toggle-stat">展开/收起统计信息</button>
            <button onclick="exportToExcel()" class="btn-export">导出Excel文件</button>
            <span id="exportTip"></span>
            <button onclick="clearCurrentClass()" class="btn-clear">清空当前班所有数据</button>
            <button onclick="toggleNamePaste()" class="toggle-btn">展开/收起 批量姓名填充</button>
        </div>
        <div class="class-edit-box" id="classEditBox">
            <label>班级名称：</label>
            <input type="text" id="classNameInput" placeholder="输入自定义班级名称">
            <button onclick="saveClassName()">保存班级名称</button>
        </div>
        <div class="name-paste" id="namePasteBox">
            <label><strong>批量粘贴学生姓名</strong>（48人，每行1个名字，粘贴后点击填充）：</label>
            <textarea id="nameInput" placeholder="学生1&#10;学生2&#10;..."></textarea>
            <button onclick="fillNames()">一键填充姓名到表格</button>
        </div>
    </div>
</div>
<div id="statInfo">点击【统计当前班级数据】更新完成情况与分数统计</div>
<table>
  <thead id="tableHead"></thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
const totalStu = 48;
let classList = [];
let currentClassId = null;
let xlsxLoaded = false;

// 核心：获取当前班级对象（确保数据写入正确的班级）
function getCurrentClass(){
    return classList.find(cls=>cls.id === currentClassId);
}

function getGradeByName(className){
    if(className.includes("三年级") || className.includes("三")) return 3;
    if(className.includes("四年级") || className.includes("四")) return 4;
    if(className.includes("五年级") || className.includes("五")) return 5;
    if(className.includes("六年级") || className.includes("六")) return 6;
    return 3;
}

function getCheckItems(grade){
    if(grade === 3 || grade === 4){
        return ["u1mind", "u1note", "u2mind", "u2note", "u3mind", "u3note"];
    }else{
        return ["u1mind", "u1note", "u2mind", "u2note", "u3mind", "u3note", "u4mind", "u4note"];
    }
}

function calcUsualRaw(stuData, grade){
    const items = getCheckItems(grade);
    let doneCount = 0;
    items.forEach(key=>{
        if(stuData[key]) doneCount++;
    })
    const totalItem = items.length;
    const perItemScore = 20 / totalItem;
    const score = doneCount * perItemScore;
    return Math.round(score * 10) / 10;
}

function getShowUsual(stuData, grade){
    const raw = calcUsualRaw(stuData, grade);
    const mid = Number(stuData.midScore) || 0;
    if(grade === 5 || grade === 6){
        if(mid > 0){
            return Math.round((raw / 2) * 10) / 10;
        }else{
            return raw;
        }
    }else{
        return raw;
    }
}

function calcTotalScore(stuData){
    const grade = getGradeByName(getCurrentClass().name);
    let unitScores = [];
    if(stuData.u1score) unitScores.push(Number(stuData.u1score)||0);
    if(stuData.u2score) unitScores.push(Number(stuData.u2score)||0);
    if(stuData.u3score) unitScores.push(Number(stuData.u3score)||0);
    if((grade ===5 || grade ===6) && stuData.u4score) unitScores.push(Number(stuData.u4score)||0);
    const unitAvg = unitScores.length > 0 ? (unitScores.reduce((a,b)=>a+b,0) / unitScores.length) : 0;

    const mid = Number(stuData.midScore) || 0;
    const final = Number(stuData.finalScore) || 0;
    const usualShow = getShowUsual(stuData, grade);
    stuData.usualScore = usualShow;

    let total;
    if(grade === 5 || grade === 6){
        if(mid > 0){
            total = unitAvg * 0.4 + usualShow + final * 0.4 + mid * 0.1;
        }else{
            total = unitAvg * 0.4 + usualShow + final * 0.4;
        }
    }else{
        if(mid > 0){
            total = unitAvg * 0.3 + usualShow + final * 0.4 + mid * 0.1;
        }else{
            total = unitAvg * 0.3 + usualShow + final * 0.5;
        }
    }
    return Math.round(total * 10) / 10;
}

// 初始化班级数据（从localStorage读取）
function initClassData(){
    const localData = localStorage.getItem("dynamicClassFullData");
    if(localData){
        try {
            classList = JSON.parse(localData);
            if(!Array.isArray(classList)){
                classList = Object.keys(classList).map(key=>({
                    id: Number(key),
                    name: classList[key].name,
                    data: classList[key].data
                }));
            }
        } catch (e) {
            console.error("本地数据解析失败，初始化默认数据", e);
            classList = [];
        }
    }
    // 初始化默认班级
    if(classList.length === 0){
        let id = 1;
        for(let i=1;i<=8;i++) classList.push({id: id++, name: `三年级${i}班`, data: {}});
        for(let i=1;i<=8;i++) classList.push({id: id++, name: `四年级${i}班`, data: {}});
        for(let i=1;i<=8;i++) classList.push({id: id++, name: `五年级${i}班`, data: {}});
        for(let i=1;i<=8;i++) classList.push({id: id++, name: `六年级${i}班`, data: {}});
    }
    currentClassId = classList[0].id;
    // 预计算所有班级的成绩
    classList.forEach(cls=>{
        const g = getGradeByName(cls.name);
        Object.values(cls.data).forEach(stu=>{
            stu.usualScore = getShowUsual(stu, g);
            stu.totalScore = calcTotalScore(stu);
        })
    })
    saveClassList();
}

// 核心：保存班级列表到localStorage（数据持久化）
function saveClassList(){
    try {
        localStorage.setItem("dynamicClassFullData", JSON.stringify(classList));
        console.log("数据已成功保存到localStorage");
    } catch (e) {
        console.error("数据保存失败", e);
        alert("数据保存失败，浏览器存储可能已满");
    }
}

function initClassSelect(){
    const select = document.getElementById("classSelect");
    select.innerHTML = "";
    classList.forEach(cls=>{
        const option = document.createElement("option");
        option.value = cls.id;
        option.innerText = cls.name;
        select.appendChild(option);
    })
    select.value = currentClassId;
    document.getElementById("delClassBtn").disabled = classList.length <= 1;
}

document.getElementById("classSelect").addEventListener("change", function(){
    currentClassId = Number(this.value);
    renderTable();
    calcAllStat();
})

function addClass(){
    const maxId = classList.reduce((max, cls)=>Math.max(max, cls.id), 0);
    const newId = maxId + 1;
    const newName = `新班级${newId}`;
    classList.push({id: newId, name: newName, data: {}});
    saveClassList();
    initClassSelect();
    currentClassId = newId;
    document.getElementById("classSelect").value = newId;
    renderTable();
    calcAllStat();
    alert(`已成功新增班级：${newName}，可点击【编辑当前班级名称】修改名称`);
}

function deleteCurrentClass(){
    if(classList.length <= 1){
        alert("至少需要保留1个班级，无法删除");
        return;
    }
    const currentClass = getCurrentClass();
    if(!confirm(`确认删除班级【${currentClass.name}】？该班级的所有作业、成绩数据将全部删除，无法恢复！`)) return;
    classList = classList.filter(cls=>cls.id !== currentClassId);
    saveClassList();
    currentClassId = classList[0].id;
    initClassSelect();
    renderTable();
    calcAllStat();
    alert(`已成功删除班级【${currentClass.name}】`);
}

function toggleClassEdit(){
    const box = document.getElementById("classEditBox");
    const isShow = box.style.display === "block";
    box.style.display = isShow ? "none" : "block";
    if(!isShow){
        const currentClass = getCurrentClass();
        document.getElementById("classNameInput").value = currentClass.name;
        document.getElementById("classNameInput").focus();
    }
}

function saveClassName(){
    const newName = document.getElementById("classNameInput").value.trim();
    if(!newName){
        alert("请输入班级名称");
        return;
    }
    const currentClass = getCurrentClass();
    currentClass.name = newName;
    saveClassList();
    initClassSelect();
    toggleClassEdit();
    renderTable();
    calcAllStat();
    alert(`班级名称已修改为：${newName}`);
}

function toggleNamePaste(){
    const box = document.getElementById("namePasteBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

function toggleStatInfo(){
    const statBox = document.getElementById("statInfo");
    const isShow = statBox.style.display === "block";
    statBox.style.display = isShow ? "none" : "block";
}

function toggleTopMenu(){
    const menu = document.getElementById('topMenu');
    const btn = document.querySelector('.toggle-menu-btn');
    menu.classList.toggle('show');
    btn.innerText = menu.classList.contains('show') ? '收起操作菜单栏' : '展开操作菜单栏';
}

function renderTableHead(grade){
    const thead = document.getElementById("tableHead");
    let tr1 = `<tr>
        <th rowspan="2">学号</th>
        <th rowspan="2">姓名</th>
        <th colspan="3" class="unit-title">第一单元</th>
        <th colspan="3" class="unit-title">第二单元</th>
        <th colspan="3" class="unit-title">第三单元</th>`;
    let tr2 = `<tr>
        <th>思维导图</th><th>笔记</th><th>单元练习</th>
        <th>思维导图</th><th>笔记</th><th>单元练习</th>
        <th>思维导图</th><th>笔记</th><th>单元练习</th>`;
    if(grade ===5 || grade ===6){
        tr1 += `<th colspan="3" class="unit-title">第四单元</th>`;
        tr2 += `<th>思维导图</th><th>笔记</th><th>单元练习</th>`;
    }
    tr1 += `<th colspan="4" class="score-title">成绩</th></tr>`;
    tr2 += `<th>期中</th><th>期末</th><th>平时成绩</th><th>总成绩</th></tr>`;
    thead.innerHTML = tr1 + tr2;
}

function getFieldList(grade){
    let base = ["u1mind", "u1note", "u1score","u2mind", "u2note", "u2score","u3mind", "u3note", "u3score"];
    if(grade ===5 || grade ===6) base.push("u4mind", "u4note", "u4score");
    base.push("midScore", "finalScore", "usualScore", "totalScore");
    return base;
}

function renderTable(){
    const currentClass = getCurrentClass();
    const grade = getGradeByName(currentClass.name);
    const fieldKeys = getFieldList(grade);
    renderTableHead(grade);
    const wrap = document.getElementById("tableBody");
    wrap.innerHTML = "";
    const classData = currentClass.data;

    for(let no=1;no<=totalStu;no++){
        const tr = document.createElement("tr");
        tr.dataset.row = no;
        let html = `<td>${no}</td>`;
        let stu = classData[no] || {name:""};
        stu.totalScore = calcTotalScore(stu);
        html += `<td><input type="text" data-no="${no}" data-key="name" value="${stu.name}" onchange="saveCurrentClass()"></td>`;
        
        fieldKeys.forEach((k, colIdx)=>{
            if(k.includes("mind") || k.includes("note")){
                let checked = stu[k] ? "checked" : "";
                html += `<td><input type="checkbox" data-no="${no}" data-key="${k}" ${checked} onchange="saveCurrentClass()"></td>`;
            }else if(k === "usualScore" || k === "totalScore"){
                html += `<td><input type="number" data-no="${no}" data-key="${k}" value="${stu[k] || 0}" readonly></td>`;
            }else{
                let score = stu[k] || "";
                html += `<td>
                    <input type="number" 
                        class="score-input" 
                        data-row="${no}" 
                        data-col="${colIdx}" 
                        data-no="${no}" 
                        data-key="${k}" 
                        value="${score}" 
                        onchange="saveCurrentClass()">
                </td>`;
            }
        })
        tr.innerHTML = html;
        wrap.appendChild(tr);
    }
    bindExcelCellEvent();
}

// 核心修复：Excel单元格交互（按列粘贴+空行对应空单元格+自动保存+回车切换）
function bindExcelCellEvent(){
    const allScoreInputs = document.querySelectorAll('.score-input');
    const currentClass = getCurrentClass();
    const grade = getGradeByName(currentClass.name);

    allScoreInputs.forEach(input => {
        // 聚焦自动全选内容
        input.addEventListener('focus', function(){
            this.select();
        });

        // 核心适配：空行对应空单元格，完整保留所有行
        input.addEventListener('paste', function(e){
            e.preventDefault();
            const curRow = parseInt(this.dataset.row);
            const curCol = parseInt(this.dataset.col);
            const curKey = this.dataset.key;
            const pasteTxt = (e.clipboardData || window.clipboardData).getData('text');
            
            // 关键修改：去掉空行过滤，完整保留所有行（包括空行）
            const rowDataList = pasteTxt.replace(/\r\n/g, '\n')
                .split('\n')
                .map(s => s.trim());

            // 1. 先更新DOM视图，空行对应空单元格
            rowDataList.forEach((val, offset) => {
                const targetRow = curRow + offset;
                if(targetRow > totalStu) return;
                const targetInput = document.querySelector(
                    `.score-input[data-row="${targetRow}"][data-col="${curCol}"]`
                );
                if(targetInput){
                    targetInput.value = val; // 空行直接设为空字符串
                    targetInput.dispatchEvent(new Event('input'));
                }
            });

            // 2. 同步更新内存数据，空值也完整写入
            rowDataList.forEach((val, offset) => {
                const targetRow = curRow + offset;
                if(targetRow > totalStu) return;
                if(!currentClass.data[targetRow]) currentClass.data[targetRow] = {};
                currentClass.data[targetRow][curKey] = val; // 空值直接写入
                // 同步计算平时成绩和总成绩
                currentClass.data[targetRow].usualScore = getShowUsual(currentClass.data[targetRow], grade);
                currentClass.data[targetRow].totalScore = calcTotalScore(currentClass.data[targetRow]);
            });

            // 3. 立即保存到localStorage
            saveClassList();

            // 4. 刷新统计信息
            calcAllStat();

            // 5. 聚焦最后一个填充的单元格
            const lastRow = Math.min(curRow + rowDataList.length - 1, totalStu);
            const lastInput = document.querySelector(
                `.score-input[data-row="${lastRow}"][data-col="${curCol}"]`
            );
            if(lastInput) lastInput.focus();

            console.log(`已成功粘贴${rowDataList.length}行成绩，空行已对应空单元格，数据已保存`);
        });

        // 键盘导航：回车/方向键/Tab切换单元格
        input.addEventListener('keydown', function(e){
            const curRow = parseInt(this.dataset.row);
            const curCol = parseInt(this.dataset.col);

            // 回车 / ↓ 同列下一行
            if(e.key === 'Enter' || e.key === 'ArrowDown'){
                e.preventDefault();
                const nextRow = curRow + 1;
                if(nextRow <= totalStu){
                    const nextInput = document.querySelector(
                        `.score-input[data-row="${nextRow}"][data-col="${curCol}"]`
                    );
                    if(nextInput) nextInput.focus();
                }
            }
            // ↑ 同列上一行
            else if(e.key === 'ArrowUp'){
                e.preventDefault();
                const prevRow = curRow - 1;
                if(prevRow >= 1){
                    const prevInput = document.querySelector(
                        `.score-input[data-row="${prevRow}"][data-col="${curCol}"]`
                    );
                    if(prevInput) prevInput.focus();
                }
            }
            // Tab / Shift+Tab 同行左右切换
            else if(e.key === 'Tab'){
                e.preventDefault();
                const allInRow = Array.from(document.querySelectorAll(`.score-input[data-row="${curRow}"]`));
                const idx = allInRow.indexOf(this);
                let target = null;
                if(!e.shiftKey){
                    target = allInRow[idx + 1] || allInRow[0];
                }else{
                    target = allInRow[idx - 1] || allInRow[allInRow.length - 1];
                }
                if(target) target.focus();
            }
        });
    });
}

function fillNames(){
    const nameText = document.getElementById("nameInput").value.trim();
    const nameList = nameText.split("\n").filter(n=>n.trim()!=="");
    if(nameList.length===0){
        alert("请先粘贴学生姓名，每行1个");
        return;
    }
    const currentClass = getCurrentClass();
    const grade = getGradeByName(currentClass.name);
    const classData = currentClass.data;
    nameList.forEach((name, idx)=>{
        const no = idx+1;
        if(no>totalStu) return;
        if(!classData[no]) classData[no] = {};
        classData[no].name = name.trim();
        classData[no].usualScore = getShowUsual(classData[no], grade);
        classData[no].totalScore = calcTotalScore(classData[no]);
    })
    saveClassList();
    renderTable();
    alert(`已成功填充${nameList.length}个学生姓名到【${currentClass.name}】`);
}

// 核心：保存当前班级所有数据（手动输入/修改时触发）
function saveCurrentClass(){
    const allInputs = document.querySelectorAll("input");
    const currentClass = getCurrentClass();
    const grade = getGradeByName(currentClass.name);
    const classData = {};

    // 遍历所有输入框，采集数据
    allInputs.forEach(input=>{
        const n = input.dataset.no;
        const k = input.dataset.key;
        if(!n || !k) return;
        if(!classData[n]) classData[n] = {};
        if(input.type==="checkbox"){
            classData[n][k] = input.checked;
        }else{
            classData[n][k] = input.value;
        }
    })

    // 预计算所有学生的成绩
    Object.values(classData).forEach(stu=>{
        stu.usualScore = getShowUsual(stu, grade);
        stu.totalScore = calcTotalScore(stu);
    })

    // 更新内存数据
    currentClass.data = classData;
    // 保存到localStorage
    saveClassList();
    // 刷新统计信息
    calcAllStat();
}

function calcAllStat(){
    const currentClass = getCurrentClass();
    const className = currentClass.name;
    const grade = getGradeByName(className);
    const classData = currentClass.data;
    let u1mind=0,u1note=0,u2mind=0,u2note=0,u3mind=0,u3note=0,u4mind=0,u4note=0;
    let u1scoreList=[],u2scoreList=[],u3scoreList=[],u4scoreList=[];
    let midList=[],finalList=[],usualList=[],totalList=[];
    Object.values(classData).forEach(stu=>{
        if(stu.u1mind) u1mind++;
        if(stu.u1note) u1note++;
        if(stu.u2mind) u2mind++;
        if(stu.u2note) u2note++;
        if(stu.u3mind) u3mind++;
        if(stu.u3note) u3note++;
        if(stu.u4mind) u4mind++;
        if(stu.u4note) u4note;
        if(stu.u1score) u1scoreList.push(Number(stu.u1score));
        if(stu.u2score) u2scoreList.push(Number(stu.u2score));
        if(stu.u3score) u3scoreList.push(Number(stu.u3score));
        if(stu.u4score) u4scoreList.push(Number(stu.u4score));
        if(stu.midScore) midList.push(Number(stu.midScore));
        if(stu.finalScore) finalList.push(Number(stu.finalScore));
        if(stu.usualScore) usualList.push(Number(stu.usualScore));
        if(stu.totalScore) totalList.push(Number(stu.totalScore));
    })
    const calcScore = (list)=>{
        if(list.length===0) return {avg:"-",max:"-",min:"-"};
        const sum = list.reduce((a,b)=>a+b,0);
        return {avg:(sum/list.length).toFixed(1),max:Math.max(...list),min:Math.min(...list)}
    }
    const u1score = calcScore(u1scoreList);
    const u2score = calcScore(u2scoreList);
    const u3score = calcScore(u3scoreList);
    const u4score = calcScore(u4scoreList);
    const midScore = calcScore(midList);
    const finalScore = calcScore(finalList);
    const usualScore = calcScore(usualList);
    const totalScore = calcScore(totalList);
    let info = `<strong>${className}统计（全班${totalStu}人）</strong><br>
【作业完成情况】<br>
第一单元：思维导图${u1mind}人完成｜笔记${u1note}人完成<br>
第二单元：思维导图${u2mind}人完成｜笔记${u2note}人完成<br>
第三单元：思维导图${u3mind}人完成｜笔记${u3note}人完成<br>`;
    if(grade ===5 || grade ===6) info += `第四单元：思维导图${u4mind}人完成｜笔记${u4note}人完成<br>`;
    info += `<br>【分数统计（平均分/最高分/最低分）】<br>
第一单元练习：${u1score.avg} / ${u1score.max} / ${u1score.min}<br>
第二单元练习：${u2score.avg} / ${u2score.max} / ${u2score.min}<br>
第三单元练习：${u3score.avg} / ${u3score.max} / ${u3score.min}<br>`;
    if(grade ===5 || grade ===6) info += `第四单元练习：${u4score.avg} / ${u4score.max} / ${u4score.min}<br>`;
    info += `期中成绩：${midScore.avg} / ${midScore.max} / ${midScore.min}<br>
期末成绩：${finalScore.avg} / ${finalScore.max} / ${finalScore.min}<br>
平时成绩：${usualScore.avg} / ${usualScore.max} / ${usualScore.min}<br>
总成绩：${totalScore.avg} / ${totalScore.max} / ${totalScore.min}`;
    document.getElementById("statInfo").innerHTML = info;
}

function exportToExcel(){
    if(!xlsxLoaded){
        alert("Excel导出库加载中，请稍后重试");
        return;
    }
    const currentClass = getCurrentClass();
    const className = currentClass.name;
    const grade = getGradeByName(className);
    const classData = currentClass.data;
    let header = ["学号","姓名","第一单元-思维导图","第一单元-笔记","第一单元-单元练习","第二单元-思维导图","第二单元-笔记","第二单元-单元练习","第三单元-思维导图","第三单元-笔记","第三单元-单元练习"];
    if(grade ===5 || grade ===6) header.push("第四单元-思维导图","第四单元-笔记","第四单元-单元练习");
    header.push("期中成绩","期末成绩","平时成绩","总成绩");
    const fieldKeys = getFieldList(grade);
    const rows = [];
    for(let no=1;no<=totalStu;no++){
        const stu = classData[no] || {name:""};
        const row = [no, stu.name];
        fieldKeys.forEach(k=>{
            if(k.includes("mind") || k.includes("note")) row.push(stu[k] ? "√" : "");
            else row.push(stu[k] || "");
        })
        rows.push(row);
    }
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
    XLSX.utils.book_append_sheet(wb, ws, `${className}_成绩表`);
    XLSX.writeFile(wb, `${className}_成绩表.xlsx`);
    alert(`${className} Excel文件已导出`);
}

function clearCurrentClass(){
    const currentClass = getCurrentClass();
    const className = currentClass.name;
    if(!confirm(`确认清空${className}所有数据？包括姓名、打勾、分数，无法恢复！`)) return;
    currentClass.data = {};
    saveClassList();
    renderTable();
    calcAllStat();
}

window.onload = ()=>{
    initClassData();
    initClassSelect();
    renderTable();
    calcAllStat();
    // 加载Excel导出库
    const script = document.createElement("script");
    script.src = "https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js";
    script.onload = ()=>{xlsxLoaded = true;};
    script.onerror = ()=>{alert("Excel导出库加载失败，可正常使用其他功能");};
    document.body.appendChild(script);
}
</script>
